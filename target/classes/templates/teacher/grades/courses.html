<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Mes Cours</title><style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; min-height: 100vh; }
    .topbar { background: linear-gradient(135deg, #1a2980 0%, #26d0ce 100%); color: white; padding: 16px 28px; display: flex; align-items: center; justify-content: space-between; }
    .topbar h1 { font-size: 19px; font-weight: 700; }
    .user-info { display: flex; align-items: center; gap: 10px; }
    .avatar { width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,.25); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; }
    .logout-btn { background: rgba(255,255,255,.2); color: white; border: 1px solid rgba(255,255,255,.4); padding: 6px 14px; border-radius: 8px; text-decoration: none; font-size: 12px; }
    .content { max-width: 900px; margin: 28px auto; padding: 0 16px; }
    .alert-ok { background: #e8f5e9; border-left: 4px solid #43a047; color: #2e7d32; padding: 12px 16px; border-radius: 6px; margin-bottom: 18px; font-size: 14px; }
    .card { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 2px 10px rgba(0,0,0,.08); margin-bottom: 20px; }
    .card-title { font-size: 16px; font-weight: 700; color: #1a2980; margin-bottom: 18px; }
    .course-card { border: 2px solid #e8eaf6; border-radius: 10px; padding: 18px 20px; margin-bottom: 14px; display: flex; justify-content: space-between; align-items: center; transition: border-color .2s; }
    .course-card:hover { border-color: #1a2980; }
    .course-info h3 { font-size: 15px; color: #1a2980; font-weight: 700; }
    .course-info p { font-size: 13px; color: #888; margin-top: 3px; }
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 18px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; text-decoration: none; transition: opacity .15s; }
    .btn:hover { opacity: .85; }
    .btn-primary { background: #1a2980; color: white; }
    .btn-success { background: #27ae60; color: white; }
    .btn-back { background: #ecf0f1; color: #555; }
    .empty { text-align: center; padding: 40px; color: #bbb; font-size: 14px; }
    .breadcrumb { font-size: 13px; color: #888; margin-bottom: 16px; }
    .breadcrumb a { color: #1a2980; text-decoration: none; }
</style></head>
<body>
<div class="topbar">
  <h1>&#128221; Gestion des Notes</h1>
  <div class="user-info">
    <div class="avatar" th:text="${#strings.toUpperCase(#strings.substring(teacher.name,0,1))}">P</div>
    <div style="font-size:13px;font-weight:600;" th:text="${teacher.name}">Prof</div>
    <a href="/logout" class="logout-btn">Déconnexion</a>
  </div>
</div>

<div class="content">
  <div class="breadcrumb"><a href="/teacher/home">&#127968; Accueil</a> › Mes cours</div>

  <div th:if="${success}" class="alert-ok" th:text="${success}"></div>

  <div class="card">
    <div class="card-title">&#128218; Sélectionnez un cours pour saisir les notes</div>

    <div th:if="${courses.isEmpty()}" class="empty">
      &#128218; Aucun cours ne vous est assigné.<br>
      <small>Contactez l'administrateur pour vous assigner des cours.</small>
    </div>

    <div th:each="c : ${courses}" class="course-card">
      <div class="course-info">
        <h3 th:text="${c.title}">Titre du cours</h3>
        <p th:text="${c.description != null ? c.description : 'Pas de description'}">Description</p>
      </div>
      <a th:href="@{/teacher/grades/course/{id}(id=${c.id})}" class="btn btn-success">
        &#9998; Saisir les notes
      </a>
    </div>
  </div>

  <a href="/teacher/home" class="btn btn-back">&#8592; Retour à l'accueil</a>
</div>
</body></html>
