<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Espace Enseignant</title><style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; min-height: 100vh; }
    .topbar { background: linear-gradient(135deg, #1a2980 0%, #26d0ce 100%); color: white; padding: 18px 32px; display: flex; align-items: center; justify-content: space-between; }
    .topbar h1 { font-size: 20px; font-weight: 700; }
    .user-info { display: flex; align-items: center; gap: 12px; }
    .avatar { width: 38px; height: 38px; border-radius: 50%; background: rgba(255,255,255,.25); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 15px; flex-shrink:0; }
    .logout-btn { background: rgba(255,255,255,.2); color: white; border: 1px solid rgba(255,255,255,.4); padding: 7px 16px; border-radius: 8px; text-decoration: none; font-size: 13px; }
    .content { max-width: 960px; margin: 32px auto; padding: 0 16px; }
    .welcome { background: linear-gradient(135deg, #f3e5f5, #e8eaf6); border-radius: 12px; padding: 20px 24px; margin-bottom: 24px; }
    .welcome h2 { color: #1a2980; font-size: 18px; }
    .welcome p { color: #666; font-size: 13px; margin-top: 4px; }
    .cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px,1fr)); gap: 20px; margin-bottom: 24px; }
    .card { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 2px 10px rgba(0,0,0,.08); }
    .card-title { font-size: 15px; font-weight: 700; color: #1a2980; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .info-item label { font-size: 11px; text-transform: uppercase; color: #aaa; }
    .info-item p { font-size: 14px; color: #333; font-weight: 500; margin-top: 2px; }
    .badge { padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; }
    .badge-teacher { background: #f3e5f5; color: #6a1b9a; }
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 18px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; text-decoration: none; transition: opacity .15s; }
    .btn:hover { opacity: .85; }
    .btn-primary { background: #1a2980; color: white; }
    .btn-success { background: #27ae60; color: white; }
    .course-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f2f2f2; }
    .course-item:last-child { border-bottom: none; }
    .course-name { font-size: 14px; font-weight: 600; color: #333; }
    .no-course { color: #bbb; font-size: 13px; text-align: center; padding: 20px; }
</style></head>
<body>
<div class="topbar">
  <h1>&#127979; SchoolMS — Espace Enseignant</h1>
  <div class="user-info">
    <div class="avatar" th:text="${#strings.toUpperCase(#strings.substring(teacher.name,0,1))}">P</div>
    <div>
      <div style="font-size:14px;font-weight:600;" th:text="${teacher.name}">Nom</div>
      <div style="font-size:12px;opacity:.8;" th:text="${teacher.teacherCode}">Code</div>
    </div>
    <a href="/logout" class="logout-btn">Déconnexion</a>
  </div>
</div>

<div class="content">
  <div class="welcome">
    <h2>Bonjour, <span th:text="${teacher.name}">Prof</span> 👋</h2>
    <p>Bienvenue dans votre espace enseignant. Gérez vos notes depuis ici.</p>
  </div>

  <div class="cards-grid">
    <div class="card">
      <div class="card-title">&#128100; Mes Informations</div>
      <div class="info-grid">
        <div class="info-item"><label>Code</label><p><span class="badge badge-teacher" th:text="${teacher.teacherCode}">ENS-001</span></p></div>
        <div class="info-item"><label>Nom</label><p th:text="${teacher.name}">—</p></div>
        <div class="info-item"><label>Matière</label><p th:text="${teacher.subject}">—</p></div>
        <div class="info-item"><label>Email</label><p th:text="${teacher.email != null ? teacher.email : '—'}">—</p></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">&#128218; Mes Cours assignés</div>
      <div th:if="${courses.isEmpty()}" class="no-course">Aucun cours assigné pour l'instant.</div>
      <div th:each="c : ${courses}" class="course-item">
        <span class="course-name" th:text="${c.title}">Cours</span>
        <a th:href="@{/teacher/grades/course/{id}(id=${c.id})}" class="btn btn-success" style="padding:5px 12px;font-size:12px;">&#9998; Notes</a>
      </div>
      <div style="margin-top:16px;">
        <a href="/teacher/grades" class="btn btn-primary">&#128221; Gérer toutes les notes</a>
      </div>
    </div>
  </div>
</div>
</body></html>
