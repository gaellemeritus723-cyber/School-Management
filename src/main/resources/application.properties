# ─── MySQL (Railway injecte automatiquement ces variables) ───────────────────
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/school_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:your_password_here}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ─────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ─── Thymeleaf ───────────────────────────────────────────────────────────────
spring.thymeleaf.cache=true

# ─── App ─────────────────────────────────────────────────────────────────────
server.port=${PORT:8080}
