<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head><meta charset="UTF-8"><title>Cours</title><style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; min-height: 100vh; }
    .sidebar { width: 240px; background: linear-gradient(180deg, #1a2980 0%, #26d0ce 100%); color: white; padding: 20px 0; position: fixed; height: 100vh; overflow-y: auto; z-index: 100; }
    .sidebar .logo { padding: 0 20px 20px; border-bottom: 1px solid rgba(255,255,255,.2); margin-bottom: 8px; }
    .sidebar .logo h2 { font-size: 20px; font-weight: 700; }
    .sidebar .logo small { opacity: .7; font-size: 12px; }
    .sidebar nav a { display: block; padding: 11px 20px; color: rgba(255,255,255,.85); text-decoration: none; font-size: 14px; transition: background .15s; }
    .sidebar nav a:hover, .sidebar nav a.active { background: rgba(255,255,255,.18); color: white; }
    .sidebar .sec { padding: 14px 20px 4px; font-size: 10px; text-transform: uppercase; opacity: .5; letter-spacing: 1px; }
    .sidebar .bottom { position: absolute; bottom: 0; left: 0; right: 0; padding: 14px 20px; border-top: 1px solid rgba(255,255,255,.2); display: flex; align-items: center; gap: 10px; }
    .sidebar .avatar { width: 34px; height: 34px; border-radius: 50%; background: rgba(255,255,255,.25); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; flex-shrink: 0; }
    .sidebar .bottom a { color: rgba(255,255,255,.75); text-decoration: none; font-size: 12px; }
    .sidebar .bottom a:hover { color: white; }
    .main { margin-left: 240px; flex: 1; display: flex; flex-direction: column; }
    .topbar { background: white; padding: 14px 28px; box-shadow: 0 1px 4px rgba(0,0,0,.09); display: flex; align-items: center; justify-content: space-between; }
    .topbar h1 { font-size: 20px; color: #1a2980; font-weight: 700; }
    .topbar span { color: #888; font-size: 13px; }
    .content { padding: 28px; flex: 1; }
    .alert-ok { background: #e8f5e9; border-left: 4px solid #43a047; color: #2e7d32; padding: 12px 16px; border-radius: 6px; margin-bottom: 18px; font-size: 14px; }
    .alert-err { background: #ffebee; border-left: 4px solid #e53935; color: #c62828; padding: 12px 16px; border-radius: 6px; margin-bottom: 18px; font-size: 14px; }
    .card { background: white; border-radius: 12px; padding: 22px; box-shadow: 0 2px 8px rgba(0,0,0,.07); margin-bottom: 20px; }
    .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; flex-wrap: wrap; gap: 10px; }
    .search-form { display: flex; gap: 8px; }
    .search-form input { padding: 9px 13px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px; width: 240px; }
    .search-form input:focus { outline: none; border-color: #1a2980; }
    table { width: 100%; border-collapse: collapse; }
    table th { background: #f8f9fa; padding: 11px 14px; text-align: left; font-size: 12px; text-transform: uppercase; color: #999; border-bottom: 2px solid #ebebeb; }
    table td { padding: 13px 14px; border-bottom: 1px solid #f2f2f2; color: #333; font-size: 14px; vertical-align: middle; }
    table tr:last-child td { border-bottom: none; }
    table tr:hover td { background: #fafafa; }
    .empty { text-align: center; padding: 48px; color: #bbb; font-size: 15px; }
    .btn { display: inline-flex; align-items: center; gap: 5px; padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; text-decoration: none; transition: opacity .15s; }
    .btn:hover { opacity: .85; }
    .btn-primary   { background: #1a2980; color: white; }
    .btn-success   { background: #27ae60; color: white; }
    .btn-warning   { background: #e67e22; color: white; }
    .btn-danger    { background: #e74c3c; color: white; }
    .btn-purple    { background: #8e44ad; color: white; }
    .btn-secondary { background: #ecf0f1; color: #555; }
    .btn-sm { padding: 5px 11px; font-size: 12px; }
    .badge { padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 700; }
    .badge-admin { background: #fff3cd; color: #856404; }
    .badge-user  { background: #d1ecf1; color: #0c5460; }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; margin-bottom: 5px; font-weight: 600; color: #555; font-size: 13px; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px 13px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px; }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: #1a2980; }
    .field-error { color: #e74c3c; font-size: 12px; margin-top: 4px; }
    .form-actions { display: flex; gap: 10px; margin-top: 6px; }
</style></head>
<body>

<div class="sidebar">
  <div class="logo"><h2>&#127979; SchoolMS</h2><small>Gestion Scolaire</small></div>
  <nav>
    <div class="sec">Navigation</div>
    <a href="/dashboard" >&#128202; Tableau de bord</a>
    <a href="/students"  >&#127891; Etudiants</a>
    <a href="/teachers"  >&#128104;&#8205;&#127979; Enseignants</a>
    <a href="/courses"   class="active">&#128218; Cours</a>
    <div class="sec" sec:authorize="hasRole('ADMIN')">Administration</div>
    <a href="/admin/users"  sec:authorize="hasRole('ADMIN')">&#128101; Utilisateurs</a>
    <a href="/report/pdf" sec:authorize="hasRole('ADMIN')">&#128196; Rapport PDF</a>
  </nav>
  <div class="bottom">
    <div class="avatar" th:text="${#strings.toUpperCase(#strings.substring(#authentication.name,0,1))}">U</div>
    <div>
      <div style="font-size:13px;font-weight:600;" th:text="${#authentication.name}">user</div>
      <a href="/logout">Deconnexion</a>
    </div>
  </div>
</div>
<div class="main">
  <div class="topbar"><h1>&#128218; Cours</h1><a href="/courses/new" class="btn btn-purple" sec:authorize="hasRole('ADMIN')">+ Nouveau cours</a></div>
  <div class="content">
    <div class="alert-ok" th:if="${success}" th:text="${success}"></div>
    <div class="card">
      <div class="toolbar">
        <form class="search-form" th:action="@{/courses}" method="get">
          <input type="text" name="search" th:value="${search}" placeholder="Rechercher par titre..."/>
          <button type="submit" class="btn btn-primary">Rechercher</button>
          <a href="/courses" class="btn btn-secondary">Reset</a>
        </form>
        <span style="color:#aaa;font-size:13px;" th:text="${courses.size()} + ' cours'"></span>
      </div>
      <div th:if="${courses.isEmpty()}" class="empty">Aucun cours trouve.</div>
      <table th:unless="${courses.isEmpty()}">
        <thead><tr><th>#</th><th>Titre</th><th>Credits</th><th>Enseignant</th><th sec:authorize="hasRole('ADMIN')">Actions</th></tr></thead>
        <tbody>
          <tr th:each="c : ${courses}">
            <td th:text="${c.id}"></td>
            <td th:text="${c.title}"></td>
            <td th:text="${c.credits != null ? c.credits : '-'}"></td>
            <td th:text="${c.teacher != null ? c.teacher.name : 'Non assigne'}"></td>
            <td sec:authorize="hasRole('ADMIN')">
              <a th:href="@{/courses/edit/{id}(id=${c.id})}" class="btn btn-warning btn-sm">Modifier</a>
              <form th:action="@{/courses/delete/{id}(id=${c.id})}" method="post" style="display:inline;" onsubmit="return confirm('Supprimer ?')">
                <button type="submit" class="btn btn-danger btn-sm">Supprimer</button>
              </form>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
</body></html>
